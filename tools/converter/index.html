<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Format Converter — Team Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">Format Converter</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">CSV &middot; Excel &middot; JSON</div>
    </header>

    <main class="max-w-4xl mx-auto p-6 space-y-6">
        <p class="text-sm text-slate-600 max-w-2xl">
            Upload a CSV, Excel, or JSON file and download it as any of the other formats.
        </p>

        <div class="bg-white border border-slate-200 rounded-xl p-5">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Upload File</label>
            <input type="file" id="file-input" accept=".csv,.xlsx,.xls,.json" class="block w-full text-sm text-slate-700 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-100 file:text-slate-800 hover:file:bg-slate-200">
            <p id="file-status" class="text-xs text-slate-500 mt-2"></p>
        </div>

        <div id="results" class="hidden space-y-4">
            <div class="bg-white border border-slate-200 rounded-xl p-5">
                <h3 class="text-sm font-medium text-slate-700 mb-3">Download as</h3>
                <div class="flex flex-wrap gap-3">
                    <button onclick="convertAndDownload('csv')" class="bg-[#0062F1] hover:bg-[#0050C7] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">CSV</button>
                    <button onclick="convertAndDownload('xlsx')" class="bg-[#0062F1] hover:bg-[#0050C7] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">Excel (.xlsx)</button>
                    <button onclick="convertAndDownload('json')" class="bg-[#0062F1] hover:bg-[#0050C7] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">JSON</button>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <h3 class="text-sm font-medium text-slate-700 mb-3">Preview (first 20 rows)</h3>
                <div id="preview-container" class="overflow-x-auto"></div>
            </div>
        </div>
    </main>

    <script src="../shared/parse.js"></script>
    <script>
        let fileData = null;
        let baseName = 'converted';

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md bg-red-50 border border-red-300 text-red-500';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                fileData = await parseFileToRows(file);
                baseName = file.name.replace(/\.[^/.]+$/, '') || 'converted';
                document.getElementById('file-status').innerText = `${file.name} — ${fileData.rows.length.toLocaleString()} rows, ${fileData.columns.length} columns`;

                const preview = fileData.rows.slice(0, 20);
                document.getElementById('preview-container').innerHTML = `
                    <table class="w-full text-left text-xs">
                        <thead><tr class="border-b border-slate-200 text-slate-600 uppercase">
                            ${fileData.columns.map(c => `<th class="py-2 px-3">${escapeHtml(c)}</th>`).join('')}
                        </tr></thead>
                        <tbody class="divide-y divide-slate-200">
                            ${preview.map(r => `<tr>${fileData.columns.map(c => `<td class="py-2 px-3 text-slate-700">${escapeHtml(r[c])}</td>`).join('')}</tr>`).join('')}
                        </tbody>
                    </table>
                `;

                document.getElementById('results').classList.remove('hidden');
            } catch (err) {
                showToast('Could not parse file: ' + err.message);
            }
        });

        function convertAndDownload(format) {
            if (!fileData) return;
            if (format === 'csv') downloadCSV(`${baseName}.csv`, fileData.columns, fileData.rows);
            else if (format === 'xlsx') downloadExcel(`${baseName}.xlsx`, fileData.columns, fileData.rows);
            else downloadJSON(`${baseName}.json`, fileData.rows);
        }
    </script>
</body>
</html>
