<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column Statistics — Data and Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">Column Statistics</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Instant data profiling</div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-6">
        <p class="text-sm text-slate-600 max-w-2xl">
            Upload any CSV or Excel file and get instant per-column statistics — no schema mapping
            required. A fast "what's in this file" check.
        </p>

        <div class="bg-white border border-slate-200 rounded-xl p-5">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Upload File</label>
            <input type="file" id="file-input" accept=".csv,.xlsx,.xls" class="block w-full text-sm text-slate-700 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-100 file:text-slate-800 hover:file:bg-slate-200">
            <p id="file-status" class="text-xs text-slate-500 mt-2"></p>
        </div>

        <div id="results" class="hidden space-y-4">
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Rows</p>
                    <p id="stat-rows" class="text-2xl font-bold text-[#00133C] mt-1">0</p>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Columns</p>
                    <p id="stat-cols" class="text-2xl font-bold text-[#0062F1] mt-1">0</p>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Duplicate Rows</p>
                    <p id="stat-dupes" class="text-2xl font-bold text-amber-600 mt-1">0</p>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Numeric Columns</p>
                    <p id="stat-numeric" class="text-2xl font-bold text-[#DC6803] mt-1">0</p>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-sm font-medium text-slate-700">Per-Column Summary</h3>
                    <button onclick="exportSummary()" class="text-xs text-[#0062F1] hover:text-[#00133C] font-medium">Export CSV</button>
                </div>
                <div id="summary-container" class="overflow-x-auto"></div>
            </div>
        </div>
    </main>

    <script src="../shared/parse.js"></script>
    <script>
        let fileData = null;
        let lastSummary = null;

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md bg-red-50 border border-red-300 text-red-500';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function isBlank(v) {
            return v === null || v === undefined || (typeof v === 'string' && v.trim() === '');
        }

        function toNum(v) {
            if (isBlank(v)) return null;
            if (typeof v === 'number') return Number.isFinite(v) ? v : null;
            const s = String(v).trim();
            if (!/^[+-]?(\d+\.?\d*|\.\d+)([eE][+-]?\d+)?$/.test(s)) return null;
            const n = Number(s);
            return Number.isFinite(n) ? n : null;
        }

        function mean(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0; }

        function median(sorted) {
            const n = sorted.length;
            if (n === 0) return 0;
            const mid = Math.floor(n / 2);
            return n % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        }

        function stddev(arr, m) {
            if (arr.length < 2) return 0;
            const variance = arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length;
            return Math.sqrt(variance);
        }

        function fmt(v) {
            if (v === null || v === undefined || Number.isNaN(v)) return '—';
            return Number(v).toLocaleString(undefined, { maximumFractionDigits: 2 });
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                fileData = await parseFileToRows(file);
                document.getElementById('file-status').innerText = `${file.name} — ${fileData.rows.length.toLocaleString()} rows, ${fileData.columns.length} columns`;
                analyze();
            } catch (err) {
                showToast('Could not parse file: ' + err.message);
            }
        });

        function analyze() {
            const { columns, rows } = fileData;

            const seen = new Set();
            let dupeCount = 0;
            for (const r of rows) {
                const key = columns.map(c => String(r[c])).join('');
                if (seen.has(key)) dupeCount++;
                else seen.add(key);
            }

            const summary = columns.map(col => {
                const rawVals = rows.map(r => r[col]);
                const nonNull = rawVals.filter(v => !isBlank(v));
                const nullCount = rawVals.length - nonNull.length;
                const numericVals = nonNull.map(toNum).filter(v => v !== null);
                const isNumeric = nonNull.length > 0 && numericVals.length / nonNull.length >= 0.9;
                const uniqueCount = new Set(nonNull.map(String)).size;

                if (isNumeric) {
                    const sorted = numericVals.slice().sort((a, b) => a - b);
                    const m = mean(numericVals);
                    return {
                        column: col, type: 'numeric', count: rawVals.length, nulls: nullCount,
                        null_pct: rawVals.length ? (nullCount / rawVals.length) * 100 : 0,
                        unique: uniqueCount,
                        min: sorted.length ? sorted[0] : null,
                        max: sorted.length ? sorted[sorted.length - 1] : null,
                        mean: m, median: median(sorted), stddev: stddev(numericVals, m),
                        top_value: null, top_freq: null
                    };
                }

                const freq = new Map();
                for (const v of nonNull) {
                    const key = String(v);
                    freq.set(key, (freq.get(key) || 0) + 1);
                }
                let topValue = null;
                let topFreq = 0;
                for (const [k, v] of freq.entries()) {
                    if (v > topFreq) { topFreq = v; topValue = k; }
                }

                return {
                    column: col, type: 'text', count: rawVals.length, nulls: nullCount,
                    null_pct: rawVals.length ? (nullCount / rawVals.length) * 100 : 0,
                    unique: uniqueCount, min: null, max: null, mean: null, median: null, stddev: null,
                    top_value: topValue, top_freq: topFreq
                };
            });

            lastSummary = summary;

            document.getElementById('stat-rows').innerText = rows.length.toLocaleString();
            document.getElementById('stat-cols').innerText = columns.length.toLocaleString();
            document.getElementById('stat-dupes').innerText = dupeCount.toLocaleString();
            document.getElementById('stat-numeric').innerText = summary.filter(s => s.type === 'numeric').length.toLocaleString();

            document.getElementById('summary-container').innerHTML = `
                <table class="w-full text-left text-xs">
                    <thead><tr class="border-b border-slate-200 text-slate-600 uppercase">
                        <th class="py-2 px-3">Column</th>
                        <th class="py-2 px-3">Type</th>
                        <th class="py-2 px-3 text-right">Nulls</th>
                        <th class="py-2 px-3 text-right">Unique</th>
                        <th class="py-2 px-3 text-right">Min</th>
                        <th class="py-2 px-3 text-right">Max</th>
                        <th class="py-2 px-3 text-right">Mean</th>
                        <th class="py-2 px-3 text-right">Median</th>
                        <th class="py-2 px-3 text-right">Std Dev</th>
                        <th class="py-2 px-3">Most Common</th>
                    </tr></thead>
                    <tbody class="divide-y divide-slate-100">
                        ${summary.map(s => `
                            <tr class="hover:bg-slate-50">
                                <td class="py-2 px-3 font-medium text-slate-800">${escapeHtml(s.column)}</td>
                                <td class="py-2 px-3">
                                    <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${s.type === 'numeric' ? 'bg-blue-50 text-[#0062F1]' : 'bg-slate-100 text-slate-600'}">${s.type}</span>
                                </td>
                                <td class="py-2 px-3 text-right text-slate-700">${s.nulls.toLocaleString()} (${s.null_pct.toFixed(0)}%)</td>
                                <td class="py-2 px-3 text-right text-slate-700">${s.unique.toLocaleString()}</td>
                                <td class="py-2 px-3 text-right text-slate-700">${fmt(s.min)}</td>
                                <td class="py-2 px-3 text-right text-slate-700">${fmt(s.max)}</td>
                                <td class="py-2 px-3 text-right text-slate-700">${fmt(s.mean)}</td>
                                <td class="py-2 px-3 text-right text-slate-700">${fmt(s.median)}</td>
                                <td class="py-2 px-3 text-right text-slate-700">${fmt(s.stddev)}</td>
                                <td class="py-2 px-3 text-slate-700">${s.top_value !== null ? `${escapeHtml(s.top_value)} (${s.top_freq})` : '—'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('results').classList.remove('hidden');
        }

        function exportSummary() {
            if (!lastSummary) return;
            const cols = ['column', 'type', 'count', 'nulls', 'null_pct', 'unique', 'min', 'max', 'mean', 'median', 'stddev', 'top_value', 'top_freq'];
            downloadCSV('column_statistics.csv', cols, lastSummary);
        }
    </script>
</body>
</html>
