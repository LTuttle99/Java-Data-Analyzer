<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer — Data and Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">Text Analyzer</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Word &amp; character counts</div>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-6">
        <div class="bg-white border border-slate-200 rounded-xl p-5">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Paste or type text</label>
            <textarea id="text-input" spellcheck="true" rows="10"
                class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-sm text-slate-900 focus:border-[#0062F1] focus:outline-none resize-y"
                placeholder="Start typing or paste text here..."></textarea>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
            <div class="bg-white border border-slate-200 p-4 rounded-xl">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Words</p>
                <p id="stat-words" class="text-2xl font-bold text-[#00133C] mt-1">0</p>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Characters</p>
                <p id="stat-chars" class="text-2xl font-bold text-[#0062F1] mt-1">0</p>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">No Spaces</p>
                <p id="stat-chars-nospace" class="text-2xl font-bold text-slate-700 mt-1">0</p>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Sentences</p>
                <p id="stat-sentences" class="text-2xl font-bold text-[#DC6803] mt-1">0</p>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Paragraphs</p>
                <p id="stat-paragraphs" class="text-2xl font-bold text-slate-700 mt-1">0</p>
            </div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Reading Time</p>
                <p id="stat-reading" class="text-2xl font-bold text-emerald-600 mt-1">0 min</p>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-4">
            <h3 class="text-sm font-medium text-slate-700 mb-3">Most Frequent Words</h3>
            <div id="word-freq" class="space-y-1.5"></div>
        </div>
    </main>

    <script>
        const STOPWORDS = new Set(['the','a','an','and','or','but','if','then','else','for','of','to','in','on','at','by','with','is','are','was','were','be','been','being','it','this','that','these','those','i','you','he','she','we','they','my','your','his','her','its','our','their','as','from','not','no','so','do','does','did','have','has','had','will','would','shall','should','can','could','may','might','must','about','into','over','after','before','up','down','out','off','than','too','very','just','also']);

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
        }

        function analyze() {
            const text = document.getElementById('text-input').value;

            const words = text.trim() === '' ? [] : text.trim().split(/\s+/);
            const chars = text.length;
            const charsNoSpace = text.replace(/\s/g, '').length;
            const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(Boolean);
            const paragraphs = text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
            const readingMinutes = Math.max(0, Math.ceil(words.length / 200));

            document.getElementById('stat-words').innerText = words.length.toLocaleString();
            document.getElementById('stat-chars').innerText = chars.toLocaleString();
            document.getElementById('stat-chars-nospace').innerText = charsNoSpace.toLocaleString();
            document.getElementById('stat-sentences').innerText = sentences.length.toLocaleString();
            document.getElementById('stat-paragraphs').innerText = paragraphs.length.toLocaleString();
            document.getElementById('stat-reading').innerText = `${readingMinutes} min`;

            const freq = new Map();
            for (const raw of words) {
                const w = raw.toLowerCase().replace(/[^a-z0-9']/g, '');
                if (!w || STOPWORDS.has(w)) continue;
                freq.set(w, (freq.get(w) || 0) + 1);
            }

            const top = Array.from(freq.entries()).sort((a, b) => b[1] - a[1]).slice(0, 15);
            const maxCount = top.length ? top[0][1] : 1;

            const container = document.getElementById('word-freq');
            if (top.length === 0) {
                container.innerHTML = '<p class="text-sm text-slate-400 italic">No significant words yet.</p>';
            } else {
                container.innerHTML = top.map(([word, count]) => `
                    <div class="flex items-center gap-3">
                        <span class="w-28 text-xs text-slate-700 truncate">${escapeHtml(word)}</span>
                        <div class="flex-1 bg-slate-100 rounded-full h-2.5">
                            <div class="bg-[#0062F1] h-2.5 rounded-full" style="width: ${(count / maxCount) * 100}%"></div>
                        </div>
                        <span class="w-8 text-xs text-slate-500 text-right">${count}</span>
                    </div>
                `).join('');
            }
        }

        document.getElementById('text-input').addEventListener('input', analyze);
        analyze();
    </script>
</body>
</html>
