<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Diff — Data and Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">Text Diff</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Line-level comparison</div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-4">
        <p class="text-sm text-slate-600 max-w-2xl">
            Paste two blocks of text — configs, emails, document revisions — and see exactly which
            lines were added, removed, or kept.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Original</label>
                <textarea id="text-a" spellcheck="false" rows="12"
                    class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-sm font-mono text-slate-900 focus:border-[#0062F1] focus:outline-none resize-y"
                    placeholder="Paste the original text..."></textarea>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Revised</label>
                <textarea id="text-b" spellcheck="false" rows="12"
                    class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-sm font-mono text-slate-900 focus:border-[#0062F1] focus:outline-none resize-y"
                    placeholder="Paste the revised text..."></textarea>
            </div>
        </div>

        <button onclick="runDiff()" class="bg-[#0062F1] hover:bg-[#0050C7] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
            Compare
        </button>

        <div id="results" class="hidden space-y-4">
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Added</p>
                    <p id="count-added" class="text-2xl font-bold text-emerald-600 mt-1">0</p>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Removed</p>
                    <p id="count-removed" class="text-2xl font-bold text-red-600 mt-1">0</p>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Unchanged</p>
                    <p id="count-same" class="text-2xl font-bold text-slate-500 mt-1">0</p>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <div id="diff-output" class="text-xs font-mono overflow-x-auto"></div>
            </div>
        </div>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md bg-red-50 border border-red-300 text-red-500';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function diffLines(linesA, linesB) {
            const n = linesA.length;
            const m = linesB.length;

            const dp = new Array(n + 1);
            for (let i = 0; i <= n; i++) dp[i] = new Uint32Array(m + 1);

            for (let i = n - 1; i >= 0; i--) {
                for (let j = m - 1; j >= 0; j--) {
                    dp[i][j] = linesA[i] === linesB[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
                }
            }

            const result = [];
            let i = 0;
            let j = 0;
            while (i < n && j < m) {
                if (linesA[i] === linesB[j]) {
                    result.push({ type: 'same', text: linesA[i] });
                    i++; j++;
                } else if (dp[i + 1][j] >= dp[i][j + 1]) {
                    result.push({ type: 'removed', text: linesA[i] });
                    i++;
                } else {
                    result.push({ type: 'added', text: linesB[j] });
                    j++;
                }
            }
            while (i < n) { result.push({ type: 'removed', text: linesA[i] }); i++; }
            while (j < m) { result.push({ type: 'added', text: linesB[j] }); j++; }
            return result;
        }

        function runDiff() {
            const a = document.getElementById('text-a').value;
            const b = document.getElementById('text-b').value;

            const linesA = a.split('\n');
            const linesB = b.split('\n');

            if (linesA.length * linesB.length > 4000000) {
                showToast('These texts are too large to diff line-by-line in the browser (limit ~2,000 lines each side).');
                return;
            }

            const diff = diffLines(linesA, linesB);

            const added = diff.filter(d => d.type === 'added').length;
            const removed = diff.filter(d => d.type === 'removed').length;
            const same = diff.filter(d => d.type === 'same').length;

            document.getElementById('count-added').innerText = added.toLocaleString();
            document.getElementById('count-removed').innerText = removed.toLocaleString();
            document.getElementById('count-same').innerText = same.toLocaleString();

            document.getElementById('diff-output').innerHTML = diff.map(d => {
                const bg = d.type === 'added' ? 'bg-emerald-50' : d.type === 'removed' ? 'bg-red-50' : '';
                const color = d.type === 'added' ? 'text-emerald-700' : d.type === 'removed' ? 'text-red-700' : 'text-slate-600';
                const prefix = d.type === 'added' ? '+' : d.type === 'removed' ? '-' : ' ';
                return `<div class="${bg} ${color} px-2 py-0.5 whitespace-pre-wrap break-words">${prefix} ${escapeHtml(d.text)}</div>`;
            }).join('');

            document.getElementById('results').classList.remove('hidden');
        }
    </script>
</body>
</html>
