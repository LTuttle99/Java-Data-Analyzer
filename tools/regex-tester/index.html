<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester — Data and Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">Regex Tester</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Live matches &middot; capture groups</div>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-4">
        <div class="bg-white border border-slate-200 rounded-xl p-5 space-y-3">
            <div class="flex items-center gap-2">
                <span class="text-slate-400 font-mono text-lg">/</span>
                <input type="text" id="pattern-input" placeholder="pattern, e.g. \b[A-Z][a-z]+\b"
                    class="flex-1 bg-slate-50 border border-slate-300 rounded-lg text-sm p-2.5 text-slate-900 focus:border-[#0062F1] focus:outline-none font-mono">
                <span class="text-slate-400 font-mono text-lg">/</span>
                <input type="text" id="flags-input" value="g" maxlength="6" placeholder="flags"
                    class="w-20 bg-slate-50 border border-slate-300 rounded-lg text-sm p-2.5 text-slate-900 focus:border-[#0062F1] focus:outline-none font-mono">
            </div>
            <div class="flex flex-wrap gap-2 text-xs text-slate-500">
                <label class="flex items-center gap-1"><input type="checkbox" data-flag="g" checked class="accent-[#0062F1]"> global</label>
                <label class="flex items-center gap-1"><input type="checkbox" data-flag="i" class="accent-[#0062F1]"> ignoreCase</label>
                <label class="flex items-center gap-1"><input type="checkbox" data-flag="m" class="accent-[#0062F1]"> multiline</label>
                <label class="flex items-center gap-1"><input type="checkbox" data-flag="s" class="accent-[#0062F1]"> dotAll</label>
            </div>
            <p id="regex-error" class="hidden text-xs text-red-600"></p>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-5">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Test String</label>
            <textarea id="test-input" spellcheck="false" rows="8"
                class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-sm font-mono text-slate-900 focus:border-[#0062F1] focus:outline-none resize-y"
                placeholder="Paste text to test the pattern against...">Contact us at hello@example.com or admin@brotherhoodmutual.com for help.</textarea>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-5">
            <div class="flex items-center justify-between mb-2">
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Highlighted Matches</label>
                <span id="match-count" class="text-xs font-semibold text-[#0062F1]">0 matches</span>
            </div>
            <div id="highlighted-output" class="text-sm font-mono whitespace-pre-wrap break-words leading-relaxed bg-slate-50 border border-slate-200 rounded-lg p-3 min-h-[3rem]"></div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-4">
            <h3 class="text-sm font-medium text-slate-700 mb-3">Match Details</h3>
            <div id="match-list" class="space-y-2 text-xs"></div>
        </div>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
        }

        const patternInput = document.getElementById('pattern-input');
        const flagsInput = document.getElementById('flags-input');
        const testInput = document.getElementById('test-input');
        const errorEl = document.getElementById('regex-error');
        const outputEl = document.getElementById('highlighted-output');
        const matchCountEl = document.getElementById('match-count');
        const matchListEl = document.getElementById('match-list');
        const flagCheckboxes = document.querySelectorAll('[data-flag]');

        patternInput.value = '\\b[\\w.+-]+@[\\w-]+\\.[a-zA-Z]{2,}\\b';

        function syncFlagsFromCheckboxes() {
            const flags = Array.from(flagCheckboxes).filter(cb => cb.checked).map(cb => cb.dataset.flag).join('');
            flagsInput.value = flags;
        }

        function syncCheckboxesFromFlags() {
            const flags = flagsInput.value;
            flagCheckboxes.forEach(cb => { cb.checked = flags.includes(cb.dataset.flag); });
        }

        function render() {
            const pattern = patternInput.value;
            const flags = flagsInput.value.replace(/[^gimsuy]/g, '');
            const text = testInput.value;

            if (!pattern) {
                errorEl.classList.add('hidden');
                outputEl.innerText = text;
                matchCountEl.innerText = '0 matches';
                matchListEl.innerHTML = '<p class="text-slate-400 italic">Enter a pattern to see matches.</p>';
                return;
            }

            let re;
            try {
                re = new RegExp(pattern, flags.includes('g') ? flags : flags + 'g');
                errorEl.classList.add('hidden');
            } catch (err) {
                errorEl.classList.remove('hidden');
                errorEl.innerText = err.message;
                outputEl.innerText = text;
                matchCountEl.innerText = '0 matches';
                matchListEl.innerHTML = '';
                return;
            }

            const matches = [];
            let m;
            let lastIndex = 0;
            let safety = 0;
            const globalRe = new RegExp(re.source, re.flags.includes('g') ? re.flags : re.flags + 'g');

            let html = '';

            while ((m = globalRe.exec(text)) !== null) {
                matches.push(m);
                html += escapeHtml(text.slice(lastIndex, m.index));
                html += `<mark class="bg-[#0062F1]/20 text-[#00133C] rounded px-0.5">${escapeHtml(m[0])}</mark>`;
                lastIndex = m.index + m[0].length;

                if (m[0].length === 0) { globalRe.lastIndex++; }
                safety++;
                if (safety > 5000) break;
            }
            html += escapeHtml(text.slice(lastIndex));

            outputEl.innerHTML = html || '<span class="text-slate-400 italic">(empty test string)</span>';
            matchCountEl.innerText = `${matches.length} match${matches.length === 1 ? '' : 'es'}`;

            if (matches.length === 0) {
                matchListEl.innerHTML = '<p class="text-slate-400 italic">No matches.</p>';
            } else {
                matchListEl.innerHTML = matches.slice(0, 200).map((match, i) => {
                    const groups = match.slice(1).map((g, gi) => `<span class="text-slate-500">group ${gi + 1}:</span> <span class="text-[#0062F1] font-mono">${g === undefined ? '(undefined)' : escapeHtml(g)}</span>`).join(' &middot; ');
                    return `
                        <div class="border border-slate-200 rounded-lg px-3 py-2">
                            <span class="text-slate-500">#${i + 1} at index ${match.index}:</span>
                            <span class="font-mono text-[#00133C] font-semibold">${escapeHtml(match[0])}</span>
                            ${groups ? `<div class="mt-1">${groups}</div>` : ''}
                        </div>
                    `;
                }).join('');
                if (matches.length > 200) {
                    matchListEl.innerHTML += `<p class="text-slate-400 italic">...and ${matches.length - 200} more.</p>`;
                }
            }
        }

        patternInput.addEventListener('input', render);
        flagsInput.addEventListener('input', () => { syncCheckboxesFromFlags(); render(); });
        testInput.addEventListener('input', render);
        flagCheckboxes.forEach(cb => cb.addEventListener('change', () => { syncFlagsFromCheckboxes(); render(); }));

        syncCheckboxesFromFlags();
        render();
    </script>
</body>
</html>
