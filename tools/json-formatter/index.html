<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter — Team Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">JSON Formatter</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Validate &middot; Pretty-print &middot; Minify</div>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-4">
        <div class="flex flex-wrap items-center gap-3">
            <button onclick="formatJson(2)" class="bg-[#0062F1] hover:bg-[#0050C7] text-white text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Pretty-print</button>
            <button onclick="minifyJson()" class="bg-slate-100 hover:bg-slate-200 text-slate-900 text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Minify</button>
            <button onclick="copyJson()" class="bg-slate-100 hover:bg-slate-200 text-slate-900 text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Copy</button>
            <button onclick="downloadJson()" class="bg-slate-100 hover:bg-slate-200 text-slate-900 text-sm font-semibold px-4 py-2 rounded-lg transition-colors">Download .json</button>
            <label class="bg-slate-100 hover:bg-slate-200 text-slate-900 text-sm font-semibold px-4 py-2 rounded-lg transition-colors cursor-pointer">
                Upload .json
                <input type="file" id="file-input" accept=".json" class="hidden">
            </label>
            <div class="flex-1"></div>
            <span id="status-badge" class="text-xs font-semibold px-3 py-1 rounded-full bg-slate-100 text-slate-600">No input yet</span>
        </div>

        <textarea id="json-input" spellcheck="false"
            class="w-full h-[28rem] bg-white border border-slate-200 rounded-xl p-4 text-sm font-mono text-slate-800 focus:border-[#0062F1] focus:outline-none resize-y"
            placeholder='Paste JSON here, e.g. {"hello": "world"}'></textarea>

        <div id="error-panel" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 text-sm text-red-500"></div>
        <div id="info-panel" class="hidden bg-white border border-slate-200 rounded-lg p-4 text-sm text-slate-600"></div>
    </main>

    <script src="../shared/parse.js"></script>
    <script>
        const input = document.getElementById('json-input');
        const statusBadge = document.getElementById('status-badge');
        const errorPanel = document.getElementById('error-panel');
        const infoPanel = document.getElementById('info-panel');

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md bg-emerald-50 border border-emerald-300 text-emerald-500';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function locateError(text, message) {
            if (/\bline \d+/.test(message)) return '';

            const m = message.match(/position (\d+)/);
            if (!m) return '';
            const pos = parseInt(m[1], 10);
            const upToError = text.slice(0, pos);
            const line = (upToError.match(/\n/g) || []).length + 1;
            const col = pos - upToError.lastIndexOf('\n');
            return ` (line ${line}, column ${col})`;
        }

        function validate() {
            const text = input.value;

            if (text.trim() === '') {
                statusBadge.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-slate-100 text-slate-600';
                statusBadge.innerText = 'No input yet';
                errorPanel.classList.add('hidden');
                infoPanel.classList.add('hidden');
                return null;
            }

            try {
                const parsed = JSON.parse(text);
                statusBadge.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-emerald-50 text-emerald-600';
                statusBadge.innerText = 'Valid JSON';
                errorPanel.classList.add('hidden');

                const isArray = Array.isArray(parsed);
                const size = new Blob([text]).size;
                infoPanel.classList.remove('hidden');
                infoPanel.innerText = `Type: ${isArray ? 'array' : typeof parsed} — ${isArray ? parsed.length + ' items' : (parsed && typeof parsed === 'object' ? Object.keys(parsed).length + ' keys' : '')} — ${size.toLocaleString()} bytes`;

                return parsed;
            } catch (err) {
                statusBadge.className = 'text-xs font-semibold px-3 py-1 rounded-full bg-red-50 text-red-600';
                statusBadge.innerText = 'Invalid JSON';
                infoPanel.classList.add('hidden');
                errorPanel.classList.remove('hidden');
                errorPanel.innerText = err.message + locateError(text, err.message);
                return undefined;
            }
        }

        input.addEventListener('input', () => { validate(); });

        function formatJson(indent) {
            const parsed = validate();
            if (parsed === undefined) { showToast('Fix the JSON error before formatting.'); return; }
            if (parsed === null) return;
            input.value = JSON.stringify(parsed, null, indent);
            validate();
        }

        function minifyJson() {
            const parsed = validate();
            if (parsed === undefined) { showToast('Fix the JSON error before minifying.'); return; }
            if (parsed === null) return;
            input.value = JSON.stringify(parsed);
            validate();
        }

        function copyJson() {
            if (!input.value) return;
            navigator.clipboard.writeText(input.value).then(() => showToast('Copied to clipboard.'));
        }

        function downloadJson() {
            if (!input.value) return;
            downloadTextFile('data.json', input.value, 'application/json;charset=utf-8;');
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            input.value = await file.text();
            validate();
        });
    </script>
</body>
</html>
