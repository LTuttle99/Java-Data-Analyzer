<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Cleaner — Team Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">Data Cleaner</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Fix messy exports</div>
    </header>

    <main class="max-w-6xl mx-auto p-6 space-y-6">
        <p class="text-sm text-slate-600 max-w-2xl">
            Upload a messy CSV or Excel file, see what's wrong with it, choose which fixes to
            apply, and download the cleaned result.
        </p>

        <div class="bg-white border border-slate-200 rounded-xl p-5">
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Upload File</label>
            <input type="file" id="file-input" accept=".csv,.xlsx,.xls" class="block w-full text-sm text-slate-700 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-slate-100 file:text-slate-800 hover:file:bg-slate-200">
            <p id="file-status" class="text-xs text-slate-500 mt-2"></p>
        </div>

        <div id="report-section" class="hidden bg-white border border-amber-200 rounded-xl p-5">
            <h3 class="text-sm font-medium text-amber-600 mb-3">Data Quality Report</h3>
            <ul id="report-list" class="space-y-1.5 text-sm text-slate-700"></ul>
        </div>

        <div id="controls" class="hidden bg-white border border-slate-200 rounded-xl p-5 space-y-4">
            <h3 class="text-sm font-medium text-slate-700">Fixes to Apply</h3>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <label class="flex items-center gap-2 bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-sm cursor-pointer">
                    <input type="checkbox" id="fix-trim" checked class="accent-[#0062F1]">
                    Trim leading/trailing whitespace from all cells
                </label>
                <label class="flex items-center gap-2 bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-sm cursor-pointer">
                    <input type="checkbox" id="fix-dedupe" checked class="accent-[#0062F1]">
                    Remove fully duplicate rows
                </label>
                <label class="flex items-center gap-2 bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-sm cursor-pointer">
                    <input type="checkbox" id="fix-drop-empty" checked class="accent-[#0062F1]">
                    Drop fully empty rows
                </label>
                <label class="flex items-center gap-2 bg-slate-50 border border-slate-300 rounded-lg px-3 py-2.5 text-sm cursor-pointer">
                    <input type="checkbox" id="fix-headers" checked class="accent-[#0062F1]">
                    Trim &amp; collapse whitespace in headers
                </label>
            </div>

            <div class="flex items-end gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Header Case</label>
                    <select id="header-case" class="bg-slate-50 border border-slate-300 rounded-lg text-sm p-2 text-slate-900">
                        <option value="none">Leave as-is</option>
                        <option value="title">Title Case</option>
                        <option value="snake">snake_case</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Fill blank cells with</label>
                    <input type="text" id="fill-value" placeholder="(leave blank to keep empty)" class="bg-slate-50 border border-slate-300 rounded-lg text-sm p-2 text-slate-900 w-56">
                </div>
                <button onclick="applyCleaning()" class="bg-[#0062F1] hover:bg-[#0050C7] text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
                    Apply &amp; Preview
                </button>
            </div>
        </div>

        <div id="results" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Rows Before</p>
                    <p id="rows-before" class="text-2xl font-bold text-[#00133C] mt-1">0</p>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-xl">
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-600">Rows After</p>
                    <p id="rows-after" class="text-2xl font-bold text-emerald-600 mt-1">0</p>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-sm font-medium text-slate-700">Preview (first 20 rows)</h3>
                    <div class="flex gap-2">
                        <button onclick="exportCleaned('csv')" class="text-xs text-[#0062F1] hover:text-[#00133C] font-medium">Download CSV</button>
                        <button onclick="exportCleaned('xlsx')" class="text-xs text-[#0062F1] hover:text-[#00133C] font-medium">Download Excel</button>
                    </div>
                </div>
                <div id="preview-container" class="overflow-x-auto"></div>
            </div>
        </div>
    </main>

    <script src="../shared/parse.js"></script>
    <script>
        let fileData = null;
        let cleanedData = null;

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md bg-red-50 border border-red-300 text-red-500';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function isBlank(v) {
            return v === null || v === undefined || (typeof v === 'string' && v.trim() === '');
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                fileData = await parseFileToRows(file);
                document.getElementById('file-status').innerText = `${file.name} — ${fileData.rows.length.toLocaleString()} rows, ${fileData.columns.length} columns`;
                buildReport();
                document.getElementById('controls').classList.remove('hidden');
                document.getElementById('results').classList.add('hidden');
            } catch (err) {
                showToast('Could not parse file: ' + err.message);
            }
        });

        function buildReport() {
            const { columns, rows } = fileData;
            const issues = [];

            const seen = new Set();
            let dupeCount = 0;
            for (const r of rows) {
                const key = columns.map(c => String(r[c])).join('');
                if (seen.has(key)) dupeCount++;
                else seen.add(key);
            }
            if (dupeCount > 0) issues.push(`${dupeCount.toLocaleString()} fully duplicate row(s) found.`);

            const emptyRowCount = rows.filter(r => columns.every(c => isBlank(r[c]))).length;
            if (emptyRowCount > 0) issues.push(`${emptyRowCount.toLocaleString()} fully empty row(s) found.`);

            let whitespaceCells = 0;
            for (const r of rows) {
                for (const c of columns) {
                    const v = r[c];
                    if (typeof v === 'string' && v !== v.trim()) whitespaceCells++;
                }
            }
            if (whitespaceCells > 0) issues.push(`${whitespaceCells.toLocaleString()} cell(s) have leading/trailing whitespace.`);

            const messyHeaders = columns.filter(c => c !== c.trim() || c === '');
            if (messyHeaders.length > 0) issues.push(`${messyHeaders.length} column header(s) have extra whitespace or are blank.`);

            for (const c of columns) {
                const blankCount = rows.filter(r => isBlank(r[c])).length;
                const pct = rows.length ? (blankCount / rows.length) * 100 : 0;
                if (pct >= 10) issues.push(`Column "${c}" is ${pct.toFixed(0)}% blank.`);
            }

            const reportSection = document.getElementById('report-section');
            const list = document.getElementById('report-list');

            if (issues.length === 0) {
                reportSection.classList.remove('hidden');
                list.innerHTML = '<li class="text-emerald-600">No obvious issues detected — this file looks clean.</li>';
            } else {
                reportSection.classList.remove('hidden');
                list.innerHTML = issues.map(i => `<li>&bull; ${escapeHtml(i)}</li>`).join('');
            }
        }

        function toTitleCase(s) {
            return s.replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ').trim().replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
        }

        function toSnakeCase(s) {
            return s.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '').replace(/_+/g, '_').toLowerCase();
        }

        function applyCleaning() {
            if (!fileData) return;

            const doTrim = document.getElementById('fix-trim').checked;
            const doDedupe = document.getElementById('fix-dedupe').checked;
            const doDropEmpty = document.getElementById('fix-drop-empty').checked;
            const doHeaders = document.getElementById('fix-headers').checked;
            const headerCase = document.getElementById('header-case').value;
            const fillValue = document.getElementById('fill-value').value;

            let columns = fileData.columns.slice();
            if (doHeaders) columns = columns.map(c => c.trim().replace(/\s+/g, ' '));
            if (headerCase === 'title') columns = columns.map(toTitleCase);
            if (headerCase === 'snake') columns = columns.map(toSnakeCase);

            const originalColumns = fileData.columns;

            let rows = fileData.rows.map(r => {
                const out = {};
                originalColumns.forEach((origCol, idx) => {
                    let v = r[origCol];
                    if (doTrim && typeof v === 'string') v = v.trim();
                    if (isBlank(v) && fillValue !== '') v = fillValue;
                    out[columns[idx]] = v;
                });
                return out;
            });

            const rowsBefore = rows.length;

            if (doDropEmpty) rows = rows.filter(r => !columns.every(c => isBlank(r[c])));

            if (doDedupe) {
                const seen = new Set();
                rows = rows.filter(r => {
                    const key = columns.map(c => String(r[c])).join('');
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });
            }

            cleanedData = { columns, rows };

            document.getElementById('rows-before').innerText = rowsBefore.toLocaleString();
            document.getElementById('rows-after').innerText = rows.length.toLocaleString();

            const preview = rows.slice(0, 20);
            document.getElementById('preview-container').innerHTML = `
                <table class="w-full text-left text-xs">
                    <thead><tr class="border-b border-slate-200 text-slate-600 uppercase">
                        ${columns.map(c => `<th class="py-2 px-3">${escapeHtml(c)}</th>`).join('')}
                    </tr></thead>
                    <tbody class="divide-y divide-slate-200">
                        ${preview.map(r => `<tr>${columns.map(c => `<td class="py-2 px-3 text-slate-700">${escapeHtml(r[c])}</td>`).join('')}</tr>`).join('')}
                    </tbody>
                </table>
            `;

            document.getElementById('results').classList.remove('hidden');
        }

        function exportCleaned(format) {
            if (!cleanedData) return;
            if (format === 'csv') downloadCSV('cleaned_data.csv', cleanedData.columns, cleanedData.rows);
            else downloadExcel('cleaned_data.xlsx', cleanedData.columns, cleanedData.rows);
        }
    </script>
</body>
</html>
