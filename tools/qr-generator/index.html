<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator — Data and Analytics Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <header class="border-b border-slate-200 bg-white px-8 py-4 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <a href="../../index.html" class="text-xs text-slate-500 hover:text-[#0062F1]">&larr; Hub</a>
            <div class="h-6 w-px bg-slate-100"></div>
            <h1 class="text-lg font-semibold text-[#00133C]">QR Code Generator</h1>
        </div>
        <div class="text-xs text-slate-600 bg-slate-50 px-3 py-1 rounded-full border border-slate-200">Text &amp; links to QR</div>
    </header>

    <main class="max-w-3xl mx-auto p-6 space-y-6">
        <div class="bg-white border border-slate-200 rounded-xl p-5 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Text or URL</label>
                <textarea id="qr-input" rows="3"
                    class="w-full bg-slate-50 border border-slate-300 rounded-lg p-3 text-sm text-slate-900 focus:border-[#0062F1] focus:outline-none resize-y"
                    placeholder="https://example.com">https://brotherhoodmutual.com</textarea>
            </div>

            <div class="flex flex-wrap items-end gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Error Correction</label>
                    <select id="error-level" class="bg-slate-50 border border-slate-300 rounded-lg text-sm p-2 text-slate-900">
                        <option value="L">Low (L)</option>
                        <option value="M" selected>Medium (M)</option>
                        <option value="Q">Quartile (Q)</option>
                        <option value="H">High (H)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Cell Size</label>
                    <select id="cell-size" class="bg-slate-50 border border-slate-300 rounded-lg text-sm p-2 text-slate-900">
                        <option value="4">Small</option>
                        <option value="6" selected>Medium</option>
                        <option value="10">Large</option>
                    </select>
                </div>
                <button id="download-btn" onclick="downloadPNG()" disabled
                    class="bg-[#0062F1] hover:bg-[#0050C7] disabled:bg-slate-300 disabled:cursor-not-allowed text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition-colors">
                    Download PNG
                </button>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-8 flex items-center justify-center min-h-[16rem]">
            <div id="qr-container"></div>
        </div>
    </main>

    <script>
        let lastQR = null;
        let lastCellSize = 6;
        let lastMargin = 4;

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'text-sm rounded-lg px-4 py-3 shadow-2xl max-w-md bg-red-50 border border-red-300 text-red-500';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function generateQR(text, errorLevel) {
            let lastErr = null;
            for (let typeNumber = 1; typeNumber <= 40; typeNumber++) {
                try {
                    const qr = qrcode(typeNumber, errorLevel);
                    qr.addData(text);
                    qr.make();
                    return qr;
                } catch (e) {
                    lastErr = e;
                }
            }
            throw lastErr || new Error('Could not encode this text as a QR code.');
        }

        function render() {
            const text = document.getElementById('qr-input').value.trim();
            const errorLevel = document.getElementById('error-level').value;
            const cellSize = parseInt(document.getElementById('cell-size').value, 10);
            const container = document.getElementById('qr-container');
            const downloadBtn = document.getElementById('download-btn');

            if (!text) {
                container.innerHTML = '<p class="text-sm text-slate-400 italic">Enter text or a URL above to generate a QR code.</p>';
                downloadBtn.disabled = true;
                lastQR = null;
                return;
            }

            try {
                const qr = generateQR(text, errorLevel);
                const margin = Math.max(4, Math.round(cellSize * 0.7));
                container.innerHTML = qr.createSvgTag(cellSize, margin);
                lastQR = qr;
                lastCellSize = cellSize;
                lastMargin = margin;
                downloadBtn.disabled = false;
            } catch (err) {
                container.innerHTML = `<p class="text-sm text-red-600">${err.message}</p>`;
                downloadBtn.disabled = true;
                lastQR = null;
            }
        }

        function downloadPNG() {
            if (!lastQR) return;

            const count = lastQR.getModuleCount();
            const size = count * lastCellSize + lastMargin * 2;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#00133C';

            for (let row = 0; row < count; row++) {
                for (let col = 0; col < count; col++) {
                    if (lastQR.isDark(row, col)) {
                        ctx.fillRect(lastMargin + col * lastCellSize, lastMargin + row * lastCellSize, lastCellSize, lastCellSize);
                    }
                }
            }

            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = 'qrcode.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        document.getElementById('qr-input').addEventListener('input', render);
        document.getElementById('error-level').addEventListener('change', render);
        document.getElementById('cell-size').addEventListener('change', render);

        render();
    </script>
</body>
</html>
